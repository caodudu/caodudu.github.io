<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Projects</title>
  <meta name="description" content="Projects">
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #647086;
      --line: #dce3ee;
      --blue: #1d5fd0;
      --blue-soft: #eaf2ff;
      --green: #0f8058;
      --green-soft: #e8f6f0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    main {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 72px 0 48px;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 24px;
    }

    a {
      color: inherit;
    }

    .button {
      display: inline-flex;
      align-items: center;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 14px;
      text-decoration: none;
      background: var(--panel);
      color: var(--ink);
      font-weight: 700;
    }

    .button.primary {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .deck {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 34px;
    }

    .slide {
      position: relative;
      min-height: 230px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      padding: 20px;
      overflow: hidden;
      text-decoration: none;
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }

    .slide::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(29, 95, 208, .11), transparent 42%),
        linear-gradient(315deg, rgba(15, 128, 88, .10), transparent 36%);
      opacity: .7;
      transition: opacity .18s ease, transform .18s ease;
    }

    .slide:hover {
      transform: translateY(-3px);
      border-color: #9bb8ec;
      box-shadow: 0 14px 34px rgba(23, 32, 51, .10);
    }

    .slide:hover::before {
      opacity: 1;
      transform: scale(1.04);
    }

    .slide-inner {
      position: relative;
      min-height: 188px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 700;
      color: var(--green);
      background: var(--green-soft);
      width: fit-content;
    }

    .slide h2 {
      margin: 0 0 10px;
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1.3;
    }

    .slide p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
      font-size: 14px;
    }

    .slide-index {
      color: var(--muted);
      font-weight: 700;
      font-size: 13px;
      letter-spacing: .08em;
    }

    .slide.primary {
      background: #10203d;
      color: #fff;
      border-color: #10203d;
    }

    .slide.primary p,
    .slide.primary .slide-index {
      color: rgba(255,255,255,.72);
    }

    .slide.primary .tag {
      color: #dff6ee;
      background: rgba(255,255,255,.14);
    }

    .slide.blank {
      background: #fbfcfe;
    }

    footer {
      margin-top: 44px;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 720px) {
      main {
        padding-top: 42px;
      }

      .deck {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="links">
        <a class="button primary" href="/sci-journal-archive/">SCI Journal Archive</a>
        <a class="button" href="https://github.com/caodudu">GitHub</a>
      </div>
    </header>

    <section class="deck" aria-label="PARA">
      <a class="slide primary" href="/sci-journal-archive/">
        <div class="slide-inner">
          <div>
            <div class="tag">P</div>
            <h2>Projects</h2>
            <p>SCI Journal Archive</p>
          </div>
          <div class="slide-index">ACTIVE</div>
        </div>
      </a>

      <div class="slide blank">
        <div class="slide-inner">
          <div>
            <div class="tag">A</div>
            <h2>Areas</h2>
            <p>Research · Data · Writing</p>
          </div>
          <div class="slide-index">STABLE</div>
        </div>
      </div>

      <div class="slide blank">
        <div class="slide-inner">
          <div>
            <div class="tag">R</div>
            <h2>Resources</h2>
            <p>Datasets · Tools · Notes</p>
          </div>
          <div class="slide-index">LIBRARY</div>
        </div>
      </div>

      <div class="slide blank">
        <div class="slide-inner">
          <div>
            <div class="tag">A</div>
            <h2>Archives</h2>
            <p>Closed · Frozen · Historical</p>
          </div>
          <div class="slide-index">PAST</div>
        </div>
      </div>
    </section>

    <footer>
      2026-06-18
    </footer>
  </main>
</body>
</html>
