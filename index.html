<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>caodudu</title>
  <meta name="description" content="caodudu">
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #647086;
      --line: #dce3ee;
      --blue: #1d5fd0;
      --blue-soft: #eaf2ff;
      --green: #0f8058;
      --green-soft: #e8f6f0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    main {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 72px 0 48px;
    }

    header {
      margin-bottom: 34px;
    }

    .eyebrow {
      color: var(--blue);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 6vw, 64px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .intro {
      margin: 18px 0 0;
      max-width: 680px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.7;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 24px;
    }

    a {
      color: inherit;
    }

    .button {
      display: inline-flex;
      align-items: center;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 14px;
      text-decoration: none;
      background: var(--panel);
      color: var(--ink);
      font-weight: 700;
    }

    .button.primary {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 34px;
    }

    .card {
      min-height: 180px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      padding: 20px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 700;
      color: var(--green);
      background: var(--green-soft);
      margin-bottom: 14px;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 20px;
      line-height: 1.3;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
      font-size: 14px;
    }

    .card a {
      display: inline-block;
      margin-top: 18px;
      color: var(--blue);
      font-weight: 700;
      text-decoration: none;
    }

    footer {
      margin-top: 44px;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 720px) {
      main {
        padding-top: 42px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="eyebrow">caodudu</div>
      <h1>caodudu</h1>
      <div class="links">
        <a class="button primary" href="/sci-journal-archive/">打开 SCI Journal Archive</a>
        <a class="button" href="https://github.com/caodudu">GitHub</a>
      </div>
    </header>

    <section class="grid" aria-label="Projects">
      <article class="card">
        <div class="tag">Active</div>
        <h2>SCI Journal Archive</h2>
        <p>
          2025 SCIE / ESCI 期刊情报工作台：影响因子、学科分类、生物相关子集、出版社与国家统计，以及后续 PubMed 扫描入口。
        </p>
        <a href="/sci-journal-archive/">进入项目</a>
      </article>

      <article class="card">
        <div class="tag">Later</div>
        <h2>Workspace</h2>
        <p>
          以后如果有值得长期维护的小工具或数据项目，再放到这里。现在保持空一点，免得页面替自己说太多话。
        </p>
      </article>
    </section>

    <footer>
      Updated 2026-06-18 · hosted on GitHub Pages
    </footer>
  </main>
</body>
</html>
